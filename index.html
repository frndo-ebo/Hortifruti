<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verde e Grão - Empório</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>
    
    <header>
        <h1>Verde e Grão - Empório</h1>
        <p>Ofertas frescas do dia &#127813;</p>
    </header>   

    <main class="container-carrossel">
        <section class="card-produto">
            <img src="https://cdn.pixabay.com/photo/2019/07/11/10/14/cherry-tomato-4330441_1280.jpg" alt="Capa do Produto">
            <div class="info">
                <h3>Tomate cereja</h3>
                <p class="preco">R$8,90</p>
                <a href="#" class="btn-zap">
                     <img src="https://is1-ssl.mzstatic.com/image/thumb/Purple221/v4/c0/94/ab/c094ab41-a44a-4da8-737f-7aad8d97b8b6/AppIcon-0-0-1x_U007epad-0-0-0-1-0-0-sRGB-0-85-220.png/256x256bb.png" 
                alt="Ícone do WhatsApp" class="capa-zap">
                     <span>Pedir no WhatsApp</span>
                </a>
            </div>
        </section>

        <section class="card-produto">
            <img src="https://images.pexels.com/photos/1132047/pexels-photo-1132047.jpeg" alt="Limão">
            <div class="info">
                <h3>Limão Siciliano</h3>
                <p class="preco">R$12,50</p>
                <a href="#" class="btn-zap">
                    <img src="https://is1-ssl.mzstatic.com/image/thumb/Purple221/v4/c0/94/ab/c094ab41-a44a-4da8-737f-7aad8d97b8b6/AppIcon-0-0-1x_U007epad-0-0-0-1-0-0-sRGB-0-85-220.png/256x256bb.png" 
                 alt="WhatsApp" class="capa-zap">
                    <span>Pedir no WhatsApp</span>
                </a>
            </div>
        </section>
    </main>
</body>
</html>
