<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho - Verde e Grão</title>
    <link rel="stylesheet" href="stylecarri.css" />
    <link rel="stylesheet" href="https://cloudflare.com" />
</head>
<body>

  <header class="padrao">
    <div class="header-container">
      <div class="logo-info">
        <h1>Verde e Grão - Empório</h1>
        <p>Ofertas frescas do dia 🍅</p>
      </div>
      <div class="nav-links">
        <nav>
          <a href="login.html" class="login-link" target="_blank">
            Login <i class="fa-solid fa-user"></i>
          </a>
        </nav>
        <nav>
          <a href="carrinho.html" class="carrinho-link" target="_blank">
            Carrinho <i class="fa-solid fa-cart-shopping"></i>
          </a>
        </nav>
      </div>
    </div>
  </header>

  <main class="carrinho-principal">
    <h2>Seu Carrinho de Compras</h2>
    
    <div class="carrinho-container">
      <div class="lista-itens"></div>

      <div class="resumo-carrinho">
        <div class="resumo-linha">
          <span>Subtotal</span>
          <span>R$ 0,00</span>
        </div>
        <div class="resumo-linha total">
          <span>Total</span>
          <span class="preco-total">R$ 0,00</span>
        </div>
        <button class="btn-finalizar">
          <i class="fa-brands fa-whatsapp"></i> Finalizar compra
        </button>
      </div>
    </div>
    <script src="carrinho.js"></script>
  </main>

</body>
</html>
