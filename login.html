<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Verde e Grão</title>
    <!-- Chama o CSS exclusivo da página de login -->
    <link class="html-embed" rel="stylesheet" href="login.css">
    <link class="html-embed" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    
    <!-- Cabeçalho idêntico ao da página principal -->
    <header class="padrao">
        <div class="header-container">
            <div class="logo-info">
                <h1>Verde e Grão <span>Empório</span></h1>
                <p>Ofertas frescas do dia &#127813;</p>
            </div>
            
            <nav class="nav-links">
                <!-- Botão Home substituindo o Login, direcionando para o início com ícone de casa. Carrinho removido. -->
                <a href="index.html" class="nav-item">
                    Home <i class="fa-solid fa-house"></i>
                </a>
            </nav>
        </div>
    </header>

    <!-- Estrutura central do formulário de login -->
    <main class="principal">
        <h2>Acessar Conta</h2>
        <p class="subtitulo-card">Bem-vindo de volta! Faça seu login</p>

        <form>
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
         
            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Sua senha secreta" required>
            </div>
                        
            <div class="botoes-container">
                <button type="submit" class="btn btn-primary">Entrar</button>
                <a href="cadastro.html" class="btn btn-secundario">Fazer Cadastro</a>
            </div>
        </form>
    </main>     

    <script src="login.js"></script>
</body>
</html>
