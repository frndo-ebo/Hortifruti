<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Verde e Grão</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    
    <header class="padrao">
        <div class="header-container">
            <div class="logo-info">
                <h1>Verde e Grão - Empório</h1>
                <p>Ofertas frescas do dia &#127813;</p>
            </div>
            
            <div class="nav-links">
                <nav>
                    <a href="login.html" class="login-link">
                        Login <i class="fa-solid fa-user"></i>
                    </a>
                </nav>
                <nav>
                    <a href="carrinho.html" class="carrinho-link">
                        Carrinho <i class="fa-solid fa-cart-shopping"></i> 
                    </a>
                </nav>
            </div>
        </div>
    </header>

    <main class="principal">
        <form>
            <label for="email">E-mail</label>
            <input type="email" id="email" required>
         
            <label for="senha">Senha</label>
            <input type="password" id="senha" required>
                        
            <div class="botoes-container">
                <button type="submit" class="btn">Entrar</button>
                <a href="cadastro.html" class="btn btn-secundario">Fazer Cadastro</a>
            </div>
        </form>
    </main>    
</body>
</html>
